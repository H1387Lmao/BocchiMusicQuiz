<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bocchi Music Quiz</title>

<style>
body {
    font-family: sans-serif;
    background: #0e0e0e;
    color: white;
    margin: 0;
}
#app {
    max-width: 420px;
    margin: auto;
    padding: 16px;
}
.hidden { display: none; }

button {
    width: 100%;
    padding: 16px;
    margin-top: 10px;
    font-size: 16px;
    background: #1a1a1a;
    border: none;
    color: white;
}
button:active { transform: scale(0.97); }

.correctFlash { background: rgba(0,255,0,0.4) !important; }
.wrongFlash { background: rgba(255,0,0,0.4) !important; }

#choices button { margin-top: 8px; }

#timer, #status {
    margin-top: 10px;
    font-size: 14px;
    color: #aaa;
}

ul { padding: 0; list-style: none; }
li {
    padding: 6px;
    margin-top: 4px;
    background: rgba(255,255,255,0.05);
}
.correct { background: rgba(0,255,0,0.2); }
.wrong { background: rgba(255,0,0,0.2); }
</style>
</head>
<body>

<div id="app">

<div id="idle">
    <h3>Bocchi Music Quiz</h3>
    <div id="loading">Background loading: 0%</div>
    <button id="startBtn">Start</button>
    <button id="preloadBtn">Preload music</button>
</div>

<div id="playing" class="hidden">
    <audio id="player" controls></audio>
    <div id="choices"></div>
    <div id="status"></div>
    <div id="timer">0.00s</div>
</div>

<div id="results" class="hidden">
    <h3>Results</h3>
    <div id="finalTime"></div>
    <button id="shareBtn">Share</button>
    <ul id="list"></ul>
</div>

</div>

<script>
const files = [
"Distortion!!.mp3","Re_Re_.mp3","UNITE.mp3","milky way.mp3",
"あのバンド.mp3","なにが悪い.mp3","ひとりぼっち東京.mp3","ひみつ基地.mp3",
"カラカラ.mp3","ギターと孤独と蒼い惑星.mp3","ドッペルゲンガー.mp3",
"フラッシュバッカー.mp3","ラブソングが歌えない.mp3","ワタシダケユウレイ.mp3",
"今、僕、アンダーグラウンドから.mp3","僕と三原色.mp3","光の中へ.mp3",
"夢を束ねて.mp3","小さな海.mp3","忘れてやらない.mp3","惑う星.mp3",
"星座になれたら.mp3","月並みに輝け.mp3","秒針少女.mp3",
"転がる岩、君に朝が降る.mp3","青い春と西の空.mp3","青春コンプレックス.mp3"
];

// ===== preload =====
let audioMap = {};
let loadedSet = new Set();
let loadingEl = document.getElementById("loading");

function preloadFile(file) {
    if (loadedSet.has(file)) return Promise.resolve();

    return new Promise(resolve => {
        const audio = new Audio("musics/" + encodeURIComponent(file));
        audio.preload = "auto";

        const done = () => {
            if (!loadedSet.has(file)) {
                loadedSet.add(file);
                loadingEl.textContent =
                    "Background loading: " + Math.floor((loadedSet.size / files.length) * 100) + "%";
            }
            resolve();
        };

        audio.addEventListener("loadeddata", done, { once: true });
        audio.addEventListener("error", done, { once: true });

        audioMap[file] = audio;
    });
}

async function preloadAllFast() {
    await Promise.all(files.map(preloadFile));
}

let preloadRunning = false;

async function preloadNextFromQueue() {
    if (preloadRunning || !queue) return;
    preloadRunning = true;

    let priority = queue.slice(index, index + 3);

    // parallel load next 3
    await Promise.all(priority.map(preloadFile));

    // background rest
    (async () => {
        for (let file of files) {
            if (!loadedSet.has(file)) {
                preloadFile(file);
                await new Promise(r => setTimeout(r, 30));
            }
        }
    })();

    preloadRunning = false;
}

// ===== utils
function shuffle(a){
    for(let i=a.length-1;i>0;i--){
        let j=Math.floor(Math.random()*(i+1));
        [a[i],a[j]]=[a[j],a[i]];
    }
}
function pickChoices(correct){
    let pool = files.filter(f=>f!==correct);
    shuffle(pool);
    let arr = [correct,...pool.slice(0,3)];
    shuffle(arr);
    return arr;
}
function formatName(name){
    return name
        .replace(".mp3","")
        .replace("Re_Re_","Re:Re:")
        .replace("_",": ");
}

// ===== DOM
const idle = document.getElementById("idle");
const playing = document.getElementById("playing");
const results = document.getElementById("results");

const player = document.getElementById("player");
const choicesEl = document.getElementById("choices");
const statusEl = document.getElementById("status");
const timerEl = document.getElementById("timer");
const listEl = document.getElementById("list");
const finalTimeEl = document.getElementById("finalTime");

// ===== state
let queue, index, stats;
let startTime, songStartTime;
let running=false, locked=false;

// ===== playback sync =====
function waitForPlaybackStart() {
    return new Promise(resolve => {
        const onPlay = () => {
            player.removeEventListener("playing", onPlay);
            resolve();
        };
        player.addEventListener("playing", onPlay);
        setTimeout(resolve, 1000);
    });
}

// ===== modes
function showIdle(){ idle.classList.remove("hidden"); playing.classList.add("hidden"); results.classList.add("hidden"); }
function showPlaying(){ idle.classList.add("hidden"); playing.classList.remove("hidden"); results.classList.add("hidden"); }
function showResults(){ idle.classList.add("hidden"); playing.classList.add("hidden"); results.classList.remove("hidden"); }

// ===== game
function initGame(){
    queue=[...files];
    shuffle(queue);
    index=0;

    stats={};
    queue.forEach(f=>stats[f]={wrong:0,solved:false,time:0});

    startTime=performance.now();
    running=true;

    preloadNextFromQueue();
    loadSong();
    updateTimer();
}

async function loadSong(){
    if(index>=queue.length) return endGame();

    let current = queue[index];
    let audio = audioMap[current];

    if (audio) {
        audio.currentTime = 0;
        player.src = audio.src;
    } else {
        player.src = "musics/" + encodeURIComponent(current);
    }

    renderChoices(current);
    player.load();
    statusEl.textContent = "Loading...";

    try {
        await player.play();
    } catch {
        statusEl.textContent = "Tap play";
        await waitForPlaybackStart();
    }

    await waitForPlaybackStart();

    statusEl.textContent = "";
    songStartTime = performance.now();

}

function renderChoices(correct){
    choicesEl.innerHTML="";
    statusEl.textContent="";

    pickChoices(correct).forEach(opt=>{
        let b=document.createElement("button");
        b.textContent=formatName(opt);
        b.onclick=()=>handleAnswer(b,opt,correct);
        choicesEl.appendChild(b);
    });
}

function handleAnswer(btn,selected,correct){
    if(!running||locked) return;
    locked=true;

    if(selected===correct){
        btn.classList.add("correctFlash");
        statusEl.textContent="Correct";

        let t=(performance.now()-songStartTime)/1000;
        stats[correct].solved=true;
        stats[correct].time=t;

        setTimeout(()=>{
            index++;
            locked=false;
            preloadNextFromQueue();
            loadSong();
        },350);
    } else {
        btn.classList.add("wrongFlash");
        statusEl.textContent="Wrong";
        stats[correct].wrong++;
        startTime-=10000;

        setTimeout(()=>{
            btn.classList.remove("wrongFlash");
            locked=false;
        },300);
    }
}

function endGame(){
    running=false;
    player.pause();

    let total=(performance.now()-startTime)/1000;
    finalTimeEl.textContent="Total Time: "+total.toFixed(2)+"s";

    renderList();
    showResults();
}

// ===== timer
function updateTimer(){
    if(!running) return;

    if (!player.paused && !player.seeking) {
        timerEl.textContent =
            ((performance.now()-startTime)/1000).toFixed(2)+"s";
    }

    requestAnimationFrame(updateTimer);
}

// ===== results
function renderList(){
    listEl.innerHTML="";
    queue.forEach(f=>{
        let li=document.createElement("li");
        let s=stats[f];

        if(s.solved&&s.wrong===0) li.classList.add("correct");
        else if(s.wrong>0) li.classList.add("wrong");

        li.textContent=`${formatName(f)} | wrong:${s.wrong} | time:${s.time.toFixed(2)}s`;
        listEl.appendChild(li);
    });
}

// ===== controls
startBtn.onclick=()=>{
    showPlaying();
    initGame();
};

document.getElementById("preloadBtn").onclick = preloadAllFast;

document.getElementById("shareBtn").onclick=()=>{
    let text=finalTimeEl.textContent+"\n";
    queue.forEach(f=>{
        let s=stats[f];
        text+=`${formatName(f)} | wrong:${s.wrong} | time:${s.time.toFixed(2)}s\n`;
    });
    navigator.clipboard.writeText(text);
    document.getElementById("shareBtn").innerText="Copied";
    setTimeout(()=>{document.getElementById("shareBtn").innerText="Share";},300);
};

showIdle();
</script>
</body>
</html>
